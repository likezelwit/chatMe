<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ThMOvie (TMO) | Ad-Free Watch Party</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="icon" href="data:,">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
    <style>
        :root {
            --bg-color: #050505;
            --text-color: #ffffff;
            --card-bg: #1e1e1e;
            --accent-color: #ff0055;
            --border-color: #333;
            --gold: #ffd700;
            --input-bg: #2a2a2a;
            --success: #00c851;
            --cobalt: #3b82f6;
        }
        * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        body {
            margin: 0; background-color: var(--bg-color); color: var(--text-color);
            font-family: 'Poppins', sans-serif; overflow: hidden; height: 100vh; width: 100vw;
        }
        .hidden { display: none !important; }
        .btn {
            padding: 12px 24px; border: none; border-radius: 8px; font-weight: bold;
            cursor: pointer; font-family: inherit; transition: 0.2s; text-align: center;
        }
        .btn:active { transform: scale(0.95); }
        .btn-cobalt { background: var(--cobalt); color: white; box-shadow: 0 4px 15px rgba(59,130,246,0.4); }
        .btn-secondary { background: var(--card-bg); color: white; border: 1px solid var(--border-color); }
        
        /* Toast & Overlays */
        #toast-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 9999; width: 90%; max-width: 400px; }
        .toast { background: rgba(30, 30, 30, 0.95); border-left: 4px solid var(--cobalt); color: white; padding: 12px; margin-bottom: 8px; border-radius: 4px; font-size: 0.85rem; animation: slideDown 0.3s; }
        @keyframes slideDown { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        #loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 1000; display: none;
            flex-direction: column; align-items: center; justify-content: center;
        }
        #loading-overlay.active { display: flex; }
        .spinner { width: 40px; height: 40px; border: 4px solid #333; border-top-color: var(--cobalt); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Hallway & Grid 10x3 */
        #lobby-view { height: 100%; display: flex; flex-direction: column; }
        header { padding: 15px; display: flex; justify-content: space-between; align-items: center; background: #000; border-bottom: 1px solid var(--border-color); }
        .logo { font-size: 1.3rem; font-weight: 700; }
        .logo span { color: var(--cobalt); }
        
        .hallway-wrapper { flex: 1; position: relative; overflow: hidden; background: #080808; display: flex; flex-direction: column; }
        .hallway-container { flex: 1; display: flex; overflow-x: auto; scroll-snap-type: x mandatory; scroll-behavior: smooth; }
        .hallway-container::-webkit-scrollbar { display: none; }
        
        .loket-column {
            min-width: 100vw; height: 100%; scroll-snap-align: center; 
            display: flex; flex-direction: column; padding: 10px;
        }
        .loket-header { 
            padding: 10px; text-align: center; font-size: 1.1rem; font-weight: bold; 
            color: var(--cobalt); border-bottom: 1px dashed #333; margin-bottom: 10px;
        }
        .pintu-container {
            display: grid; 
            grid-template-columns: repeat(10, 1fr); /* 10 Kolom */
            grid-template-rows: repeat(3, 1fr);    /* 3 Baris */
            gap: 8px; flex: 1; align-content: start;
        }
        .pintu-item {
            background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 6px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            aspect-ratio: 1/1; cursor: pointer; transition: 0.2s;
        }
        .pintu-item.occupied { border-color: var(--gold); background: rgba(255, 215, 0, 0.1); }
        .pintu-number { font-size: 0.9rem; font-weight: bold; }
        .pintu-status { font-size: 0.5rem; color: #666; }
        .pintu-item.occupied .pintu-status { color: var(--gold); }

        /* Create Room View */
        #create-room-view {
            position: fixed; inset: 0; background: var(--bg-color); z-index: 500;
            padding: 20px; overflow-y: auto; transform: translateX(100%); transition: 0.3s;
        }
        #create-room-view.active { transform: translateX(0); }
        .form-group { margin-bottom: 15px; }
        .form-label { display: block; margin-bottom: 5px; font-size: 0.85rem; color: #aaa; }
        .form-input, .form-select {
            width: 100%; padding: 12px; background: var(--input-bg); border: 1px solid var(--border-color);
            border-radius: 8px; color: white; outline: none;
        }

        /* Cinema View Mobile Optimized */
        #cinema-view {
            position: fixed; inset: 0; background: #000; z-index: 600;
            display: flex; flex-direction: column; opacity: 0; pointer-events: none; transition: 0.4s;
        }
        #cinema-view.active { opacity: 1; pointer-events: auto; }
        .video-wrapper { flex: 1; position: relative; display: flex; align-items: center; justify-content: center; background: #000; }
        #main-player-frame { width: 100%; height: 100%; border: none; }
        
        .chat-section { height: 35vh; background: #0a0a0a; display: flex; flex-direction: column; border-top: 1px solid #222; }
        .chat-msgs { flex: 1; overflow-y: auto; padding: 10px; font-size: 0.85rem; }
        .chat-input-bar { padding: 10px; display: flex; gap: 8px; background: #111; }
        .chat-input-bar input { flex: 1; background: #222; border: 1px solid #333; color: #fff; padding: 10px; border-radius: 20px; outline: none; }
        
        .cinema-controls {
            position: absolute; top: 10px; left: 10px; right: 10px; display: flex; justify-content: space-between; z-index: 10;
        }
        .c-badge { background: rgba(0,0,0,0.7); padding: 5px 10px; border-radius: 4px; font-size: 0.7rem; color: #fff; backdrop-filter: blur(4px); }

        @media (max-width: 600px) {
            .pintu-container { grid-template-columns: repeat(5, 1fr); grid-template-rows: repeat(6, 1fr); }
            .loket-column { min-width: 100vw; }
        }
    </style>
</head>
<body>

    <div id="toast-container"></div>
    <div id="loading-overlay"><div class="spinner"></div><p id="loading-text" style="margin-top:15px;">Memproses...</p></div>

    <div id="lobby-view">
        <header>
            <div class="logo">Th<span>MOvie</span></div>
            <button class="btn btn-cobalt" onclick="openCreateRoom()" style="padding: 8px 15px; font-size: 0.8rem;">+ BUAT ROOM</button>
        </header>
        
        <div style="padding: 15px; text-align: center; font-size: 0.8rem; color: #666;">
            ← Geser Loket | Pilih Pintu untuk Gabung →
        </div>

        <div class="hallway-wrapper">
            <div class="hallway-container" id="hallway"></div>
        </div>
    </div>

    <div id="create-room-view">
        <button class="btn btn-secondary" onclick="closeCreateRoom()" style="margin-bottom: 20px;">← KEMBALI</button>
        <h3 style="color: var(--cobalt);">Konfigurasi Bioskop</h3>
        
        <div class="form-group">
            <label class="form-label">Link YouTube (Original)</label>
            <input type="text" id="input-url" class="form-input" placeholder="https://www.youtube.com/watch?v=..." onblur="validateVideo()">
        </div>

        <div id="preview-area" class="hidden" style="background: #111; padding: 10px; border-radius: 8px; margin-bottom: 15px;">
            <div id="preview-title" style="font-size: 0.8rem; font-weight: 600;">-</div>
            <div id="preview-status" style="font-size: 0.7rem; color: var(--success); margin-top: 5px;">✓ Link siap diproses secara Ad-Free</div>
        </div>

        <div class="form-group">
            <label class="form-label">Jadwal Tayang</label>
            <input type="datetime-local" id="input-time" class="form-input">
        </div>

        <div class="form-group">
            <label class="form-label">Privasi</label>
            <select id="input-privacy" class="form-select">
                <option value="public">🌐 Publik (Semua Bisa Masuk)</option>
                <option value="private">🔒 Privat (Pakai Kode)</option>
            </select>
        </div>

        <button class="btn btn-cobalt" style="width: 100%; margin-top: 10px;" onclick="createRoom()">KONFIRMASI BOOKING</button>
    </div>

    <div id="cinema-view">
        <div class="cinema-controls">
            <div class="c-badge" id="c-info">LOKET - | PINTU -</div>
            <div class="c-badge" style="background: var(--accent-color); cursor:pointer;" onclick="exitCinema()">KELUAR</div>
        </div>
        
        <div class="video-wrapper">
            <div id="countdown-overlay" style="position:absolute; color:white; text-align:center; z-index:5;">
                <h1 id="timer-val">00:00</h1>
                <p style="font-size:0.8rem; letter-spacing:2px;">MENUNGGU JADWAL TAYANG</p>
            </div>
            <!-- Dynamic Player -->
            <div id="player-container" style="width:100%; height:100%;"></div>
        </div>

        <div class="chat-section">
            <div class="chat-msgs" id="chat-box"></div>
            <div class="chat-input-bar">
                <input type="text" id="chat-input" placeholder="Tulis pesan..." onkeypress="if(event.key==='Enter') sendChat()">
                <button class="btn btn-cobalt" onclick="sendChat()" style="border-radius:20px; padding: 5px 15px;">Kirim</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAumySmaAi8oHFnTu8QDtp_u_dZmoHlQd8",
            authDomain: "thmovie-3646f.firebaseapp.com",
            databaseURL: "https://thmovie-3646f-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "thmovie-3646f",
            storageBucket: "thmovie-3646f.appspot.com",
            messagingSenderId: "1041137356432",
            appId: "1:1041137356432:web:96edbe3402937c82f09215"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        let currentRoomId = null;
        let isVideoVerified = false;
        let verifiedData = null;
        const myName = "User_" + Math.floor(Math.random()*999);

        // --- UTILS ---
        function showToast(m) {
            const t = document.createElement('div');
            t.className = 'toast'; t.innerText = m;
            document.getElementById('toast-container').appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }

        function extractID(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|&v=)([^#&?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        // --- CORE LOGIC ---
        function generateHallway() {
            const hallway = document.getElementById('hallway');
            let html = '';
            for(let l=1; l<=6; l++) {
                html += `<div class="loket-column">
                    <div class="loket-header">LOKET ${l}</div>
                    <div class="pintu-container">`;
                let start = (l-1) * 30 + 1;
                for(let p=0; p<30; p++) {
                    let num = start + p;
                    html += `<div class="pintu-item" id="pintu-${l}-${num}" onclick="joinRoom(${l}, ${num})">
                        <div class="pintu-number">${num}</div>
                        <div class="pintu-status">KOSONG</div>
                    </div>`;
                }
                html += `</div></div>`;
            }
            hallway.innerHTML = html;
            listenRooms();
        }

        function listenRooms() {
            db.ref('rooms').on('value', snap => {
                document.querySelectorAll('.pintu-item').forEach(i => {
                    i.classList.remove('occupied');
                    i.querySelector('.pintu-status').innerText = "KOSONG";
                });
                snap.forEach(child => {
                    const r = child.val();
                    const el = document.getElementById(`pintu-${r.loket}-${r.pintu}`);
                    if(el) {
                        el.classList.add('occupied');
                        el.querySelector('.pintu-status').innerText = "TERISI";
                    }
                });
            });
        }

        async function validateVideo() {
            const url = document.getElementById('input-url').value;
            const id = extractID(url);
            if(!id) return showToast("URL YouTube tidak valid!");

            document.getElementById('preview-area').classList.remove('hidden');
            document.getElementById('preview-title').innerText = "Memverifikasi...";

            try {
                // Prioritas COBALT API untuk ad-free
                const res = await fetch("https://api.cobalt.tools/api/json", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Accept": "application/json" },
                    body: JSON.stringify({ url: url, isAudioOnly: false })
                });
                const data = await res.json();
                
                verifiedData = {
                    id: id,
                    // Link No-Cookie Otomatis jika Cobalt Gagal
                    streamUrl: data.url || `https://www.youtube-nocookie.com/embed/${id}?autoplay=1&modestbranding=1&rel=0`
                };
                
                document.getElementById('preview-title').innerText = "Video Terdeteksi: " + id;
                isVideoVerified = true;
            } catch(e) {
                // Fallback otomatis ke No-Cookie
                verifiedData = {
                    id: id,
                    streamUrl: `https://www.youtube-nocookie.com/embed/${id}?autoplay=1&modestbranding=1&rel=0`
                };
                document.getElementById('preview-title').innerText = "Video Terdeteksi (Mode No-Cookie)";
                isVideoVerified = true;
            }
        }

        function createRoom() {
            if(!isVideoVerified) return showToast("Verifikasi video dulu!");
            const time = document.getElementById('input-time').value;
            if(!time) return showToast("Pilih waktu tayang!");

            const l = Math.floor(Math.random()*6)+1;
            const p = (l-1)*30 + Math.floor(Math.random()*30)+1;

            const roomData = {
                loket: l, pintu: p,
                videoId: verifiedData.id,
                videoUrl: verifiedData.streamUrl,
                schedule: new Date(time).getTime(),
                privacy: document.getElementById('input-privacy').value,
                createdAt: Date.now()
            };

            db.ref('rooms').push(roomData).then(() => {
                showToast("Booking Berhasil!");
                closeCreateRoom();
            });
        }

        function joinRoom(l, p) {
            db.ref('rooms').orderByChild('pintu').equalTo(p).once('value', snap => {
                let found = false;
                snap.forEach(child => {
                    const r = child.val();
                    if(r.loket === l) {
                        found = true;
                        openCinema(child.key, r);
                    }
                });
                if(!found) showToast("Pintu ini masih kosong!");
            });
        }

        function openCinema(id, data) {
            currentRoomId = id;
            document.getElementById('cinema-view').classList.add('active');
            document.getElementById('c-info').innerText = `LOKET ${data.loket} | PINTU ${data.pintu}`;
            
            const timer = setInterval(() => {
                const now = Date.now();
                const diff = data.schedule - now;
                
                if(diff <= 0) {
                    clearInterval(timer);
                    document.getElementById('countdown-overlay').classList.add('hidden');
                    startVideo(data.videoUrl);
                } else {
                    const m = Math.floor(diff/60000);
                    const s = Math.floor((diff%60000)/1000);
                    document.getElementById('timer-val').innerText = `${m}:${s<10?'0':''}${s}`;
                }
            }, 1000);

            // Chat Listener
            db.ref(`rooms/${id}/chat`).on('child_added', s => {
                const m = s.val();
                const b = document.getElementById('chat-box');
                b.innerHTML += `<div><strong>${m.user}:</strong> ${m.text}</div>`;
                b.scrollTop = b.scrollHeight;
            });
        }

        function startVideo(url) {
            const container = document.getElementById('player-container');
            if(url.includes('youtube-nocookie.com')) {
                container.innerHTML = `<iframe id="main-player-frame" src="${url}" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
            } else {
                container.innerHTML = `<video src="${url}" controls autoplay style="width:100%; height:100%;"></video>`;
            }
        }

        function sendChat() {
            const inp = document.getElementById('chat-input');
            if(!inp.value.trim()) return;
            db.ref(`rooms/${currentRoomId}/chat`).push({
                user: myName,
                text: inp.value,
                time: Date.now()
            });
            inp.value = '';
        }

        function exitCinema() {
            location.reload();
        }

        function openCreateRoom() { document.getElementById('create-room-view').classList.add('active'); }
        function closeCreateRoom() { document.getElementById('create-room-view').classList.remove('active'); }

        window.onload = generateHallway;
    </script>
</body>
</html>
