<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kirim Saran Film - ThMovie</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; display: flex; justify-content: center; padding: 20px; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 15px; width: 100%; max-width: 400px; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        h2 { color: #f5f5f5; text-align: center; }
        input, select, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; box-sizing: border-box; }
        input, select { background: #333; color: white; }
        button { background: #007bff; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #0056b3; }
        .success { color: #2ecc71; text-align: center; display: none; margin-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h2>🎬 Kasih Saran Film!</h2>
    <p style="text-align: center; font-size: 0.9em; color: #bbb;">Bantu ThMovie makin lengkap!</p>
    
    <input type="text" id="judul" placeholder="Judul Film..." required>
    
    <select id="kategori">
        <option value="Horor">👻 Horor</option>
        <option value="Action">💥 Action</option>
        <option value="Anime">🍥 Anime</option>
        <option value="Comedy">😂 Comedy</option>
        <option value="Drama">🎭 Drama</option>
    </select>

    <input type="text" id="pengirim" placeholder="Nama Kamu (Biar masuk credit)">

    <button onclick="kirimSaran()">Kirim Saran ✨</button>
    <div id="pesanSukes" class="success">Berhasil terkirim! Makasih ya!</div>
</div>

<script>
    // Konfigurasi Firebase lo
    const firebaseConfig = {
        apiKey: "AIzaSyAumySmaAi8oHFnTu8QDtp_u_dZmoHlQd8",
        authDomain: "thmovie-3646f.firebaseapp.com",
        databaseURL: "https://thmovie-3646f-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "thmovie-3646f",
        storageBucket: "thmovie-3646f.firebasestorage.app",
        messagingSenderId: "1041137356432",
        appId: "1:1041137356432:web:96edbe3402937c82f09215"
    };

    // Inisialisasi Firebase
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    function kirimSaran() {
        const judul = document.getElementById('judul').value;
        const kategori = document.getElementById('kategori').value;
        const pengirim = document.getElementById('pengirim').value || "Anonim";

        if (judul === "") {
            alert("Isi dulu judul filmnya, Lang!");
            return;
        }

        // Simpan ke node "SaranFilm" di Firebase
        database.ref('SaranFilm').push({
            judul: judul,
            kategori: kategori,
            pengirim: pengirim,
            waktu: new Date().toLocaleString()
        }).then(() => {
            document.getElementById('pesanSukes').style.display = 'block';
            document.getElementById('judul').value = "";
            document.getElementById('pengirim').value = "";
        }).catch((error) => {
            alert("Gagal kirim: " + error.message);
        });
    }
</script>

</body>
</html>
